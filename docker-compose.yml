services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: exp
      POSTGRES_PASSWORD: exp
      POSTGRES_DB: experiments
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exp -d experiments"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
